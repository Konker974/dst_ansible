---
- name: Grant privileges
  community.mysql.mysql_user:
    name: "{{ bdd_user }}"
    password: "{{ bdd_password }}"
    plugin: caching_sha2_password
    login_user: root
    login_password: "{{ root_password }}"
    login_unix_socket: /run/mysqld/mysqld.sock
    priv: "{{ bdd_name }}.*:ALL"
    state: present
    host: "%"
