---
- name: Création du dossier
  file:
    path: "{{ app_path }}"
    state: directory

- name: Téléchargement des sources
  unarchive:
    src: "{{ dl_url }}"
    dest: /tmp
    remote_src: true

- name: Copie des sources
  copy:
    src: /tmp/PrestaShop-9.1.4/
    dest: "{{ app_path }}"
    remote_src: true