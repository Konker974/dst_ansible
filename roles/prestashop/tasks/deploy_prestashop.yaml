---
- name: Create application directory
  file:
    path: "{{ app_path }}"
    state: directory

- name: Download Prestashop
  get_url:
    url: "{{ dl_url }}"
    dest: /tmp/prestashop.zip

- name: Unarchive Prestashop
  unarchive:
    src: /tmp/prestashop.zip
    dest: "{{ app_path }}"
    remote_src: true
