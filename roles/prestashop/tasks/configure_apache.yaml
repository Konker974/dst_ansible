---
- name: Deploy PrestaShop VirtualHost
  template:
    src: prestashop.conf.j2
    dest: /etc/apache2/sites-available/prestashop.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart apache

- name: Enable rewrite module
  command: a2enmod rewrite
  register: rewrite_result
  changed_when: "'already enabled' not in rewrite_result.stdout"
  notify: restart apache

- name: Enable PrestaShop VirtualHost
  command: a2ensite prestashop.conf
  register: vhost_result
  changed_when: "'already enabled' not in vhost_result.stdout"
  notify: restart apache

- name: Disable Apache default site
  command: a2dissite 000-default.conf
  register: default_site_result
  changed_when: "'disabled' in default_site_result.stdout"
  failed_when: false
  notify: restart apache

- name: Check Apache configuration
  command: apache2ctl configtest
  changed_when: false

- name: Log configuration Apache
  debug:
    msg: |
      Apache configuré :
        - mod_rewrite         : {{ 'activé' if rewrite_result.changed else 'déjà actif' }}
        - VirtualHost prestashop : {{ 'activé' if vhost_result.changed else 'déjà actif' }}
        - Site default        : {{ 'désactivé' if default_site_result.changed else 'déjà désactivé' }}

- name: Flush handlers
  meta: flush_handlers