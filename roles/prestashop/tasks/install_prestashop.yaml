---
- name: Install npm dependencies for classic theme # in this version themes needed to be built to work correctly
  shell: npm install
  args:
    chdir: "{{ app_path }}/themes/classic/_dev"
  become: true

- name: Build classic theme assets # in this version themes needed to be built to work correctly
  shell: npm run build
  args:
    chdir: "{{ app_path }}/themes/classic/_dev"
  become: true

- name: Disable PHP display_errors # was causing PHP error display issues
  lineinfile:
    path: /etc/php/8.5/apache2/php.ini
    regexp: '^display_errors'
    line: 'display_errors = Off'

- name: Disable pcre.jit # was causing PHP error display issues
  lineinfile:
    path: /etc/php/8.5/apache2/php.ini
    regexp: '^;?pcre\.jit'
    line: 'pcre.jit = 0'

- name: Disable PrestaShop dev mode
  lineinfile:
    path: "{{ app_path }}/config/defines.inc.php"
    regexp: "define\\('_PS_MODE_DEV_',"
    line: "    define('_PS_MODE_DEV_', false);"

- name: Check if PrestaShop is already installed
  stat:
    path: "{{ app_path }}/app/config/parameters.php"
  register: ps_installed

- name: Log statut installation PrestaShop
  debug:
    msg: "PrestaShop {{ 'déjà installé (parameters.php présent) → skip installeur CLI' if ps_installed.stat.exists else 'absent → lancement de l\\'installeur CLI' }}"

- name: Install PrestaShop
  shell: >
    php install-dev/index_cli.php
    --domain={{ prestashop_domain }}
    --db_server={{ mysql_server }}
    --db_name={{ bdd_name }}
    --db_user={{ bdd_user }}
    --db_password={{ bdd_password }}
    --db_create=0
    --prefix={{ prestashop_db_prefix }}
    --email={{ prestashop_admin_mail }}
    --password={{ prestashop_admin_password }}
    --theme=classic
  args:
    chdir: "{{ app_path }}"
  register: ps_install_result
  no_log: true
  when: not ps_installed.stat.exists

- name: Log output installeur PrestaShop
  debug:
    var: ps_install_result.stdout_lines
  when: not ps_installed.stat.exists

- name: Clear PrestaShop cache
  file:
    path: "{{ app_path }}/var/cache"
    state: absent
  when: not ps_installed.stat.exists

- name: Set www-data permissions on PrestaShop
  file:
    path: "{{ app_path }}"
    owner: www-data
    group: www-data
    recurse: true

- name: Write permissions on var/ directory
  shell: chmod -R 775 {{ app_path }}/var/
  become: true

- name: Generate Symfony prod cache
  shell: php bin/console cache:warmup --env=prod
  args:
    chdir: "{{ app_path }}"
  become: true
  when: not ps_installed.stat.exists

- name: Log warmup cache Symfony
  debug:
    msg: "Cache Symfony prod généré avec succès."
  when: not ps_installed.stat.exists

- name: Fix cache permissions after warmup
  file:
    path: "{{ app_path }}/var/cache"
    owner: www-data
    group: www-data
    recurse: true
    mode: "0775"
  when: not ps_installed.stat.exists

- name: Remove install-dev directory
  file:
    path: "{{ app_path }}/install-dev"
    state: absent
  when: not ps_installed.stat.exists


- name: Flush handlers
  meta: flush_handlers